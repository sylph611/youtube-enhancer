<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Enhancer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', 'Noto Sans KR', Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ff4444;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1::before {
      content: '▶';
      font-size: 18px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .section {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shortcut-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #252525;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .shortcut-item:hover {
      background: #2a2a2a;
    }

    .shortcut-label {
      font-size: 14px;
    }

    .shortcut-description {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .shortcut-input {
      background: #333;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 16px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      min-width: 80px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .shortcut-input:focus {
      outline: none;
      border-color: #ff4444;
      background: #3a3a3a;
    }

    .shortcut-input.recording {
      border-color: #ff4444;
      background: #442222;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #ff4444;
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff5555;
    }

    .btn-secondary {
      background: #333;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #2e7d32;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Enhancer</h1>
    <p class="subtitle" data-i18n="settingsTitle"></p>

    <div class="section">
      <h2 class="section-title">⌨️ <span data-i18n="shortcutSettingsTitle"></span></h2>
      <p class="info-text" style="margin-top: 0; margin-bottom: 16px;" data-i18n="shortcutInstructions"></p>

      <div class="shortcut-list">
        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="speedDown"></div>
            <div class="shortcut-description" data-i18n="speedDownDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="speedDown" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="speedUp"></div>
            <div class="shortcut-description" data-i18n="speedUpDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="speedUp" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="speedReset"></div>
            <div class="shortcut-description" data-i18n="speedResetDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="speedReset" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="setPointA"></div>
            <div class="shortcut-description" data-i18n="setPointADesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="setPointA" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="setPointB"></div>
            <div class="shortcut-description" data-i18n="setPointBDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="setPointB" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="toggleLoop"></div>
            <div class="shortcut-description" data-i18n="toggleLoopDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="toggleLoop" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label" data-i18n="screenshot"></div>
            <div class="shortcut-description" data-i18n="screenshotDesc"></div>
          </div>
          <input type="text" class="shortcut-input" data-action="screenshot" readonly>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="saveBtn" data-i18n="save"></button>
        <button class="btn btn-secondary" id="resetBtn" data-i18n="resetDefaults"></button>
      </div>
    </div>

    <p class="info-text">💡 <span data-i18n="settingsNote"></span></p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
