<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Enhancer 설정</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', 'Noto Sans KR', Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ff4444;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1::before {
      content: '▶';
      font-size: 18px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .section {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shortcut-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #252525;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .shortcut-item:hover {
      background: #2a2a2a;
    }

    .shortcut-label {
      font-size: 14px;
    }

    .shortcut-description {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .shortcut-input {
      background: #333;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 8px 16px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      min-width: 80px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .shortcut-input:focus {
      outline: none;
      border-color: #ff4444;
      background: #3a3a3a;
    }

    .shortcut-input.recording {
      border-color: #ff4444;
      background: #442222;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #ff4444;
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff5555;
    }

    .btn-secondary {
      background: #333;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #2e7d32;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Enhancer</h1>
    <p class="subtitle">단축키 및 설정을 변경합니다</p>

    <div class="section">
      <h2 class="section-title">⌨️ 단축키 설정</h2>
      <p class="info-text" style="margin-top: 0; margin-bottom: 16px;">
        입력 칸을 클릭한 후 원하는 키를 누르세요. YouTube 기본 단축키와 충돌하지 않도록 주의하세요.
      </p>

      <div class="shortcut-list">
        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">속도 감소</div>
            <div class="shortcut-description">재생 속도를 0.1x 줄입니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="speedDown" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">속도 증가</div>
            <div class="shortcut-description">재생 속도를 0.1x 높입니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="speedUp" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">구간 시작점 (A)</div>
            <div class="shortcut-description">반복 구간의 시작 위치를 설정합니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="setPointA" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">구간 끝점 (B)</div>
            <div class="shortcut-description">반복 구간의 끝 위치를 설정합니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="setPointB" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">반복 토글</div>
            <div class="shortcut-description">구간 반복을 켜거나 끕니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="toggleLoop" readonly>
        </div>

        <div class="shortcut-item">
          <div>
            <div class="shortcut-label">스크린샷</div>
            <div class="shortcut-description">현재 화면을 캡처합니다</div>
          </div>
          <input type="text" class="shortcut-input" data-action="screenshot" readonly>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="saveBtn">저장</button>
        <button class="btn btn-secondary" id="resetBtn">기본값으로 초기화</button>
      </div>
    </div>

    <p class="info-text">
      💡 변경사항은 저장 후 YouTube 페이지를 새로고침하면 적용됩니다.
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
